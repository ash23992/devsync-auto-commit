name: Daily Repository Update

on:
  schedule:
    - cron: '17 3 * * *'   # Runs daily at 03:17 UTC (specific minute/hour required)
  workflow_dispatch:       # Allows manual trigger

jobs:
  update-repo:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: 23ds3000132@ds.study.iitm.ac.in - Daily commit step
        run: |
          echo "Last updated on $(date -u)" >> daily_log.txt

      - name: Commit and push changes
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add daily_log.txt
          git commit -m "Automated daily update"
          git push
